<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c8b7"/>
      <stop offset="100%" style="stop-color:#009e90"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bg)" rx="16"/>

  <!-- Briefcase icon -->
  <circle cx="300" cy="150" r="60" fill="white" opacity="0.12"/>
  <!-- Briefcase body -->
  <rect x="258" y="138" width="84" height="56" rx="8" fill="white" opacity="0.9"/>
  <!-- Briefcase handle -->
  <path d="M280 138 L280 126 Q280 118 288 118 L312 118 Q320 118 320 126 L320 138" fill="none" stroke="white" stroke-width="4"/>
  <!-- Briefcase line -->
  <line x1="258" y1="162" x2="342" y2="162" stroke="#00c8b7" stroke-width="3"/>

  <!-- Upward arrow accent -->
  <path d="M380 170 L380 130 M370 142 L380 130 L390 142" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- Accent dots -->
  <circle cx="210" cy="120" r="8" fill="white" opacity="0.2"/>
  <circle cx="390" cy="190" r="6" fill="#faca2c" opacity="0.4"/>

  <!-- Title -->
  <text x="300" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white" text-anchor="middle">Career Support</text>

  <!-- Subtitle -->
  <text x="300" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="white" opacity="0.8" text-anchor="middle">Build your future</text>

  <!-- Bottom accent bar -->
  <rect x="240" y="345" width="120" height="4" rx="2" fill="white" opacity="0.4"/>
</svg>
