<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0067a2"/>
      <stop offset="100%" style="stop-color:#1a2949"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bg)" rx="16"/>

  <!-- Large search icon -->
  <circle cx="300" cy="160" r="60" fill="white" opacity="0.12"/>
  <circle cx="290" cy="150" r="28" fill="none" stroke="white" stroke-width="5"/>
  <line x1="310" y1="170" x2="328" y2="188" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- Small location pin accent -->
  <circle cx="210" cy="120" r="16" fill="#00c8b7" opacity="0.4"/>
  <circle cx="380" cy="190" r="10" fill="#fa8526" opacity="0.35"/>

  <!-- Title -->
  <text x="300" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white" text-anchor="middle">Find Local Resources</text>

  <!-- Subtitle -->
  <text x="300" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="white" opacity="0.7" text-anchor="middle">Search by ZIP code</text>

  <!-- Bottom accent bar -->
  <rect x="240" y="350" width="120" height="4" rx="2" fill="#00c8b7" opacity="0.6"/>
</svg>
