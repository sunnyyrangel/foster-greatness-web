<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2949"/>
      <stop offset="100%" style="stop-color:#0067a2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c8b7"/>
      <stop offset="100%" style="stop-color:#faca2c"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot pattern -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1.5" fill="white" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Accent bar -->
  <rect x="80" y="180" width="6" height="120" rx="3" fill="url(#accent)"/>

  <!-- Main headline -->
  <text x="120" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-2">File Your Taxes</text>
  <text x="120" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#00c8b7" letter-spacing="-2">for Free</text>

  <!-- Divider -->
  <rect x="120" y="340" width="400" height="2" rx="1" fill="white" opacity="0.15"/>

  <!-- Description -->
  <text x="120" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="white" opacity="0.7">Free filing support, tax credits, &amp; walk-through help</text>
  <text x="120" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="white" opacity="0.7">for current &amp; former foster youth</text>

  <!-- Tax season badge -->
  <rect x="120" y="460" width="280" height="44" rx="22" fill="#fa8526"/>
  <text x="260" y="489" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">FILE BY APRIL 15, 2026</text>

  <!-- FG Logo text -->
  <text x="120" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="white" opacity="0.5" letter-spacing="3">FOSTER GREATNESS</text>

  <!-- Decorative circles -->
  <circle cx="950" cy="200" r="180" fill="white" opacity="0.03"/>
  <circle cx="1050" cy="350" r="220" fill="white" opacity="0.02"/>
  <circle cx="900" cy="450" r="120" fill="#00c8b7" opacity="0.05"/>
</svg>
