<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0067a2"/>
      <stop offset="100%" style="stop-color:#004d7a"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bg)" rx="16"/>

  <!-- Calendar icon -->
  <circle cx="300" cy="150" r="60" fill="white" opacity="0.1"/>
  <!-- Calendar body -->
  <rect x="262" y="128" width="76" height="64" rx="8" fill="white" opacity="0.9"/>
  <!-- Calendar top bar -->
  <rect x="262" y="128" width="76" height="20" rx="8" fill="#fa8526"/>
  <rect x="262" y="140" width="76" height="8" fill="#fa8526"/>
  <!-- Calendar rings -->
  <line x1="284" y1="122" x2="284" y2="134" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="316" y1="122" x2="316" y2="134" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Calendar date -->
  <text x="300" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#1a2949" text-anchor="middle">12</text>

  <!-- Accent dots -->
  <circle cx="210" cy="130" r="8" fill="#00c8b7" opacity="0.35"/>
  <circle cx="388" cy="180" r="6" fill="#faca2c" opacity="0.4"/>

  <!-- Title -->
  <text x="300" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white" text-anchor="middle">Upcoming Events</text>

  <!-- Subtitle -->
  <text x="300" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="white" opacity="0.7" text-anchor="middle">Connect with community</text>

  <!-- Bottom accent bar -->
  <rect x="240" y="345" width="120" height="4" rx="2" fill="#00c8b7" opacity="0.6"/>
</svg>
