<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa8526"/>
      <stop offset="100%" style="stop-color:#e06a10"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bg)" rx="16"/>

  <!-- Play button circle -->
  <circle cx="300" cy="155" r="56" fill="white" opacity="0.2"/>
  <circle cx="300" cy="155" r="42" fill="white" opacity="0.9"/>
  <!-- Play triangle -->
  <polygon points="288,135 288,175 320,155" fill="#fa8526"/>

  <!-- Film strip accents -->
  <rect x="190" y="100" width="16" height="16" rx="3" fill="white" opacity="0.15"/>
  <rect x="190" y="124" width="16" height="16" rx="3" fill="white" opacity="0.15"/>
  <rect x="394" y="170" width="16" height="16" rx="3" fill="white" opacity="0.15"/>
  <rect x="394" y="194" width="16" height="16" rx="3" fill="white" opacity="0.15"/>

  <!-- Title -->
  <text x="300" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white" text-anchor="middle">Thriver Stories</text>

  <!-- Subtitle -->
  <text x="300" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="white" opacity="0.8" text-anchor="middle">Real voices, real journeys</text>

  <!-- Bottom accent bar -->
  <rect x="240" y="345" width="120" height="4" rx="2" fill="white" opacity="0.4"/>
</svg>
