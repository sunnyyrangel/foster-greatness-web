<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2949"/>
      <stop offset="100%" style="stop-color:#0d1a33"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bg)" rx="16"/>

  <!-- Megaphone icon -->
  <circle cx="300" cy="155" r="60" fill="white" opacity="0.08"/>
  <!-- Horn body -->
  <path d="M265 130 L325 110 L325 190 L265 170 Z" fill="white" opacity="0.9"/>
  <!-- Horn bell -->
  <path d="M325 105 Q365 150 325 195" fill="none" stroke="white" stroke-width="4" opacity="0.9"/>
  <!-- Handle -->
  <rect x="255" y="128" width="12" height="44" rx="4" fill="white" opacity="0.9"/>
  <!-- Sound waves -->
  <path d="M345 125 Q370 150 345 175" fill="none" stroke="#fa8526" stroke-width="3" opacity="0.7"/>
  <path d="M360 115 Q395 150 360 185" fill="none" stroke="#faca2c" stroke-width="3" opacity="0.5"/>

  <!-- Accent dots -->
  <circle cx="200" cy="110" r="8" fill="#fa8526" opacity="0.4"/>
  <circle cx="400" cy="180" r="6" fill="#00c8b7" opacity="0.35"/>

  <!-- Title -->
  <text x="300" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white" text-anchor="middle">Announcements</text>

  <!-- Subtitle -->
  <text x="300" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="white" opacity="0.7" text-anchor="middle">Stay in the loop</text>

  <!-- Bottom accent bar -->
  <rect x="240" y="345" width="120" height="4" rx="2" fill="#fa8526" opacity="0.6"/>
</svg>
